<div class="ascii-background" aria-hidden="true"><pre id="ascii-pre"></pre></div>
<script>
  window.addEventListener('load', function () {
    requestIdleCallback(function () {
      fetch('{{ site.baseurl }}/assets/img/ascii-bg.txt')
        .then(function (r) { return r.text(); })
        .then(function (t) { document.getElementById('ascii-pre').textContent = t; });
    }, { timeout: 2000 });
  });
</script>
